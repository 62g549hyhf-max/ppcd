
<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCCD Prototype v0.4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>PCCD Prototype v0.4</h1><p>Commit1〜4統合版</p></header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('db')">Pokemon DB</button>
<button onclick="show('research')">Research</button>
</nav>

<section id="home" class="page">
<h2>今日の研究</h2>
<p>困っていることを選択（UI試作）</p>
<button>キュレムが重い</button>
<button>フェアリーが重い</button>
</section>

<section id="db" class="page" style="display:none">
<h2>Pokemon DB</h2>
<input id="q" placeholder="検索">
<div id="list"></div>
<div id="detail" style="display:none;border-top:1px solid #555;margin-top:16px;padding-top:12px">
<h3 id="name"></h3>
<p><b>理論評価</b> ★★★★★</p>
<p><b>環境評価</b> ★★★★☆</p>
<p><b>総合評価</b> ★★★★★</p>
<h4>代表型</h4>
<ul><li>スカーフ</li><li>タスキ</li><li>積みエース</li></ul>
<h4>Decision View</h4>
<button>構築相談へ（試作）</button>
</div>
</section>

<section id="research" class="page" style="display:none">
<h2>Research</h2>
<p>研究ログ（試作）</p>
<ul>
<li>ガブリアスはスカーフが最適か？ 18/30戦</li>
<li>サーフゴー採用率調査</li>
</ul>
</section>

<script src="script.js"></script>
</body></html>
